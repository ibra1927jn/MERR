name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Disable husky
        run: npm pkg delete scripts.prepare

      - name: Install dependencies
        run: npm ci

      - name: Test (shard ${{ matrix.shard }})
        run: npx vitest run --config vitest.config.ci.ts --shard=${{ matrix.shard }}
        env:
          CI: true
          NODE_OPTIONS: --max-old-space-size=3072
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsYWNlaG9sZGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjAwMDAwMDAwMH0.placeholder-key-for-ci-tests-only

  deploy:
    name: Deploy to Vercel Production
    needs: [test]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://harvestpro.vercel.app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Disable husky
        run: npm pkg delete scripts.prepare

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          NODE_ENV: production

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: Health check
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30
          curl -f https://harvestpro.vercel.app/health || exit 1

      - name: Run smoke tests on production
        run: |
          echo "Running critical smoke tests..."
          npx playwright test tests/e2e/smoke.spec.ts --config=playwright.production.config.ts
        continue-on-error: true

      - name: Notify team
        if: always()
        run: |
          echo "Production deployment completed"
          echo "URL: https://harvestpro.vercel.app"
          echo "Status: ${{ job.status }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Manual rollback required."
          echo "Check Vercel dashboard: https://vercel.com/dashboard"
