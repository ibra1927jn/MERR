name: 📦 Daily Database Backup

# Runs daily at 23:00 NZST (11:00 UTC) — before midnight NZST rollover
# Also runs manually for emergency snapshots
on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 23:00 NZST (UTC+12)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual backup (e.g. before migration, before deploy)'
        required: false
        default: 'manual-trigger'

env:
  RETENTION_DAYS: 30

jobs:
  backup:
    name: pg_dump → GitHub Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Set backup filename
        id: filename
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          echo "BACKUP_FILE=harvestpro_backup_${TIMESTAMP}.dump" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Run pg_dump (custom format — compressed, restorable)
        env:
          PGPASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          pg_dump \
            --host=${{ secrets.DATABASE_HOST }} \
            --port=5432 \
            --username=${{ secrets.DATABASE_USER }} \
            --dbname=${{ secrets.DATABASE_NAME }} \
            --format=custom \
            --compress=9 \
            --no-acl \
            --no-owner \
            --file="${{ steps.filename.outputs.BACKUP_FILE }}"
          
          echo "✅ Backup complete: ${{ steps.filename.outputs.BACKUP_FILE }}"
          ls -lh "${{ steps.filename.outputs.BACKUP_FILE }}"

      - name: Verify backup integrity
        env:
          PGPASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          # pg_restore --list verifies the dump is readable without actually restoring
          pg_restore --list "${{ steps.filename.outputs.BACKUP_FILE }}" > /dev/null
          echo "✅ Backup integrity verified (pg_restore --list passed)"

      - name: Upload backup as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.filename.outputs.TIMESTAMP }}
          path: ${{ steps.filename.outputs.BACKUP_FILE }}
          # GitHub Artifacts retain for 90 days by default on paid plans, 30 on free
          retention-days: ${{ env.RETENTION_DAYS }}
          compression-level: 0   # Already compressed by pg_dump

      - name: Export table row counts (audit sanity check)
        env:
          PGPASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          psql \
            --host=${{ secrets.DATABASE_HOST }} \
            --port=5432 \
            --username=${{ secrets.DATABASE_USER }} \
            --dbname=${{ secrets.DATABASE_NAME }} \
            --no-password \
            --command="
              SELECT schemaname, tablename, n_live_tup
              FROM pg_stat_user_tables
              ORDER BY n_live_tup DESC;
            " \
            --csv > row_counts_${{ steps.filename.outputs.TIMESTAMP }}.csv
          
          cat row_counts_${{ steps.filename.outputs.TIMESTAMP }}.csv

      - name: Upload row counts report
        uses: actions/upload-artifact@v4
        with:
          name: row-counts-${{ steps.filename.outputs.TIMESTAMP }}
          path: row_counts_${{ steps.filename.outputs.TIMESTAMP }}.csv
          retention-days: ${{ env.RETENTION_DAYS }}

      - name: Job summary
        run: |
          echo "## 📦 Backup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | ${{ steps.filename.outputs.TIMESTAMP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| File | ${{ steps.filename.outputs.BACKUP_FILE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $(ls -lh ${{ steps.filename.outputs.BACKUP_FILE }} | awk '{print $5}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Retention | ${{ env.RETENTION_DAYS }} days |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backup integrity verified via pg_restore --list" >> $GITHUB_STEP_SUMMARY

  # Alert on failure
  notify-failure:
    name: Alert on backup failure
    runs-on: ubuntu-latest
    needs: backup
    if: failure()
    steps:
      - name: Create backup failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Database backup FAILED — ${new Date().toISOString().split('T')[0]}`;
            const body = `
            ## Backup Failure Alert

            The scheduled database backup failed at ${new Date().toISOString()}.

            **Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            **Immediate actions required:**
            1. Check the workflow run logs above
            2. Verify DATABASE_HOST, DATABASE_USER, DATABASE_PASSWORD, DATABASE_NAME secrets are set
            3. Verify the Supabase direct connection string is accessible from GitHub Actions
            4. Manually run the backup workflow via: Actions → Daily Database Backup → Run workflow

            **Recovery:** See docs/RUNBOOK.md → Section 3: Database Incident
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['critical', 'backup-failure'],
            });
