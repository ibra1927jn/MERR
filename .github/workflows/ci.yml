name: CI/CD
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        shard: [1/5, 2/5, 3/5, 4/5, 5/5]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Disable husky
        run: npm pkg delete scripts.prepare

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: matrix.shard == '1/5'
        run: npm run lint --if-present

      - name: Test (shard ${{ matrix.shard }})
        run: npx vitest run --config vitest.config.ci.ts --shard=${{ matrix.shard }}
        env:
          CI: true
          NODE_OPTIONS: --max-old-space-size=6144
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsYWNlaG9sZGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjAwMDAwMDAwMH0.placeholder-key-for-ci-tests-only

  build-deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Disable husky
        run: npm pkg delete scripts.prepare

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /root/repos/${{ github.event.repository.name }}
            git config pull.rebase true
            git pull origin ${{ github.ref_name }} || git reset --hard origin/${{ github.ref_name }}
            npm ci --ignore-scripts
            npm run build --if-present

      - name: Notify Telegram Success
        if: success()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d "text=✅ <b>${{ github.event.repository.name }}</b> CI/CD passed
          📝 ${{ github.event.head_commit.message }}
          🌿 Branch: ${{ github.ref_name }}"

      - name: Notify Telegram Failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d "text=❌ <b>${{ github.event.repository.name }}</b> CI/CD FAILED
          🌿 Branch: ${{ github.ref_name }}
          🔗 https://github.com/ibra1927jn/${{ github.event.repository.name }}/actions"
