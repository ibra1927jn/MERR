name: 🔒 Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'   # Weekly Monday 02:00 UTC

permissions:
  contents: read
  security-events: write   # Required for SARIF upload to GitHub Security tab
  issues: write

jobs:
  # ── SAST: Semgrep ──────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep (OWASP Top 10 + Security rules)
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --config=p/typescript \
            --config=p/react \
            --config=p/secrets \
            --sarif \
            --output=semgrep.sarif \
            src/ \
            supabase/functions/ \
            --exclude='**/*.test.ts' \
            --exclude='**/*.test.tsx' \
            --exclude='src/types/database.types.ts' \
            || true   # Don't fail build, upload findings

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── Dependency Vulnerability Scan ─────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical + high)
        run: npm audit --audit-level=high --production

      - name: Check for known vulnerable patterns
        run: |
          # Check for hardcoded secrets patterns
          echo "Checking for hardcoded secrets..."
          if grep -r "SUPABASE_SERVICE_ROLE_KEY\|sk-[a-zA-Z0-9]\{48\}" src/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "❌ Potential hardcoded secret found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

          # Check for console.log in production services (not tests)
          echo "Checking for console.log in service layer..."
          VIOLATIONS=$(grep -r "console\.log" src/services/ src/repositories/ --include="*.ts" -l 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "⚠️  console.log found in services (should use logger):"
            echo "$VIOLATIONS"
          fi

  # ── OWASP ZAP DAST ────────────────────────────────────────────────────────
  owasp-zap:
    name: OWASP ZAP Dynamic Scan
    runs-on: ubuntu-latest
    # Only run on main branch to avoid scanning PRs with potentially sensitive env
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Start preview server
        run: |
          npm install -g serve
          serve dist -p 4173 &
          sleep 5
          curl -f http://localhost:4173 || exit 1
          echo "✅ Preview server running"

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:4173'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          fail_action: false   # Report only, don't fail build (adjust after first run)

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-${{ github.run_number }}
          path: |
            report_html.html
            report_json.json
          retention-days: 30

  # ── Secret Detection ───────────────────────────────────────────────────────
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Need full history for git history scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # Report findings, don't block (until baseline is clean)

  # ── Summary ───────────────────────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [semgrep, dependency-scan, secret-scan]
    if: always()
    steps:
      - name: Write security summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep SAST | ${{ needs.semgrep.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "OWASP ZAP runs on main branch only." >> $GITHUB_STEP_SUMMARY
          echo "View findings in the GitHub **Security** tab → Code scanning alerts." >> $GITHUB_STEP_SUMMARY
